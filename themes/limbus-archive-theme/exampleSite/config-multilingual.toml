# Multilingual Configuration Example for Limbus Archive Theme

baseURL = "https://yoursite.com/"
title = "Limbus Archive"
theme = "limbus-archive-theme"

# 默认语言
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false  # true = /en/page, false = /page

# 分页设置
paginate = 10

# 启用多语言
[languages]
  [languages.en]
    languageName = "English"
    weight = 1
    title = "Limbus Archive"
    
    [languages.en.params]
      description = "A CRT terminal-inspired archive"
      footer = "© 2025 Limbus Archive. Built with Hugo."
      mainSections = ["posts"]
    
    [[languages.en.menu.main]]
      name = "Home"
      url = "/"
      weight = 1
    
    [[languages.en.menu.main]]
      name = "Posts"
      url = "/posts/"
      weight = 2
    
    [[languages.en.menu.main]]
      name = "Archive"
      url = "/archive/"
      weight = 3
    
    [[languages.en.menu.main]]
      name = "Tags"
      url = "/tags/"
      weight = 4
    
    [[languages.en.menu.main]]
      name = "About"
      url = "/about/"
      weight = 5

  [languages.zh-cn]
    languageName = "简体中文"
    weight = 2
    title = "Limbus 档案"
    
    [languages.zh-cn.params]
      description = "一个 CRT 终端风格的档案系统"
      footer = "© 2025 Limbus 档案。由 Hugo 构建。"
      mainSections = ["posts"]
    
    [[languages.zh-cn.menu.main]]
      name = "首页"
      url = "/zh-cn/"
      weight = 1
    
    [[languages.zh-cn.menu.main]]
      name = "文章"
      url = "/zh-cn/posts/"
      weight = 2
    
    [[languages.zh-cn.menu.main]]
      name = "归档"
      url = "/zh-cn/archive/"
      weight = 3
    
    [[languages.zh-cn.menu.main]]
      name = "标签"
      url = "/zh-cn/tags/"
      weight = 4
    
    [[languages.zh-cn.menu.main]]
      name = "关于"
      url = "/zh-cn/about/"
      weight = 5

  [languages.ja]
    languageName = "日本語"
    weight = 3
    title = "Limbus アーカイブ"
    
    [languages.ja.params]
      description = "CRTターミナル風のアーカイブシステム"
      footer = "© 2025 Limbus アーカイブ。Hugo で構築。"
      mainSections = ["posts"]
    
    [[languages.ja.menu.main]]
      name = "ホーム"
      url = "/ja/"
      weight = 1
    
    [[languages.ja.menu.main]]
      name = "記事"
      url = "/ja/posts/"
      weight = 2
    
    [[languages.ja.menu.main]]
      name = "アーカイブ"
      url = "/ja/archive/"
      weight = 3
    
    [[languages.ja.menu.main]]
      name = "タグ"
      url = "/ja/tags/"
      weight = 4
    
    [[languages.ja.menu.main]]
      name = "について"
      url = "/ja/about/"
      weight = 5

# Markup 设置
[markup]
  [markup.tableOfContents]
    endLevel = 3
    ordered = false
    startLevel = 2
  
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# 输出格式
[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

# Taxonomies
[taxonomies]
  category = "categories"
  tag = "tags"
