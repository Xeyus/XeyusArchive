baseURL = "https://example.com/"
languageCode = "en-us"
title = "Limbus Archive"
theme = "limbus-archive"

# Content settings
paginate = 10
summaryLength = 70
enableRobotsTXT = true
enableGitInfo = false

# Taxonomy settings
[taxonomies]
  category = "categories"
  tag = "tags"

# Parameters
[params]
  description = "A CRT terminal-inspired archive of thoughts and code"
  footer = "© 2025 Limbus Archive. Built with Hugo & Limbus Archive Theme."
  mainSections = ["posts", "blog"]
  
  # Optional: Add your social links
  # These will appear in the footer if uncommented
  # github = "yourusername"
  # twitter = "yourusername"
  # email = "your@email.com"

# Navigation menu
[[menu.main]]
  name = "Home"
  url = "/"
  weight = 1

[[menu.main]]
  name = "Posts"
  url = "/posts/"
  weight = 2

[[menu.main]]
  name = "Archive"
  url = "/archive/"
  weight = 3

[[menu.main]]
  name = "Tags"
  url = "/tags/"
  weight = 4

[[menu.main]]
  name = "About"
  url = "/about/"
  weight = 5

# Output formats
[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML"]
  term = ["HTML"]

# RSS configuration
[outputFormats.RSS]
  mediaType = "application/rss+xml"
  baseName = "feed"

# Markup settings
[markup]
  # Table of Contents
  [markup.tableOfContents]
    endLevel = 3
    ordered = false
    startLevel = 2
  
  # Goldmark (Markdown) settings
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true  # Allow raw HTML in markdown
    [markup.goldmark.extensions]
      typographer = true
  
  # Syntax highlighting
  [markup.highlight]
    style = "monokailight"
    lineNos = false
    lineNumbersInTable = false
    noClasses = false
    guessSyntax = true

# Privacy settings
[privacy]
  [privacy.googleAnalytics]
    disable = true
  [privacy.disqus]
    disable = true
  [privacy.instagram]
    disable = true
  [privacy.twitter]
    disable = true
  [privacy.vimeo]
    disable = true
  [privacy.youtube]
    disable = true

# Minification (for production builds)
[minify]
  disableCSS = false
  disableHTML = false
  disableJS = false
  disableJSON = false
  disableSVG = false
  disableXML = false
  minifyOutput = true
  [minify.tdewolff]
    [minify.tdewolff.html]
      keepWhitespace = false
