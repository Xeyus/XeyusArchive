baseURL = "https://example.com/"
languageCode = "en-us"
title = "Limbus Archive"
theme = "limbus-archive"

# 启用 Table of Contents
[markup]
  [markup.tableOfContents]
    endLevel = 3
    ordered = false
    startLevel = 2

# 主要内容类型
[params]
  description = "A CRT terminal-inspired archive of thoughts and code"
  footer = "© 2025 Limbus Archive. Built with Hugo & Limbus Archive Theme."
  mainSections = ["posts", "blog"]

# 导航菜单
[[menu.main]]
  name = "Home"
  url = "/"
  weight = 1

[[menu.main]]
  name = "Posts"
  url = "/posts/"
  weight = 2

[[menu.main]]
  name = "About"
  url = "/about/"
  weight = 3

[[menu.main]]
  name = "Archive"
  url = "/archive/"
  weight = 4

# 启用 RSS
[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

# 分页设置
paginate = 10

# 语法高亮
[markup.highlight]
  style = "monokailight"
  lineNos = false
  lineNumbersInTable = false
  noClasses = false
