{{ if .Site.IsMultiLingual }}
<div class="language-switcher" style="
  margin-top: 2rem;
  padding-top: 1rem;
  border-top: 1px solid var(--color-border);
">
  <div style="
    font-family: var(--font-ui);
    font-size: 0.85rem;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
    color: #666;
    letter-spacing: 0.05em;
  ">
    {{ i18n "menu" | default "Language" }}
  </div>
  
  <div style="display: flex; flex-wrap: wrap; gap: 0.5rem;">
  {{ range .Site.Languages }}
  {{ if eq .Lang $.Site.Language.Lang }}
  <span style="
    display: inline-block;
    padding: 0.4rem 0.7rem;
    font-family: var(--font-ui);
    font-size: 0.85rem;
    background: rgba(0, 0, 0, 0.1);
    border: 1px solid var(--color-border);
    box-shadow: 
      inset 2px 2px 3px rgba(0, 0, 0, 0.15),
      inset -1px -1px 0 rgba(255, 255, 255, 0.2);
    color: var(--color-accent);
    font-weight: 700;
  ">
    {{ .LanguageName }}
  </span>
  {{ else }}
  <a href="{{ .Lang | relLangURL }}" style="
    display: inline-block;
    padding: 0.4rem 0.7rem;
    font-family: var(--font-ui);
    font-size: 0.85rem;
    border: 1px solid var(--color-border);
    box-shadow: 
      2px 2px 0 rgba(0, 0, 0, 0.1),
      inset -1px -1px 0 rgba(0, 0, 0, 0.05),
      inset 1px 1px 0 rgba(255, 255, 255, 0.3);
    transition: all 0.1s ease;
  " onmouseover="this.style.color='var(--color-accent)'; this.style.borderColor='var(--color-accent)';" onmouseout="this.style.color='var(--color-text)'; this.style.borderColor='var(--color-border)';">
    {{ .LanguageName }}
  </a>
  {{ end }}
  {{ end }}
  </div>
</div>
{{ end }}
