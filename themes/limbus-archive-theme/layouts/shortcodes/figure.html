{{- $src := .Get "src" -}}
{{- $alt := .Get "alt" | default "" -}}
{{- $caption := .Get "caption" | default "" -}}

<figure style="
  margin: 2rem 0;
  text-align: center;
">
  <img src="{{ $src }}" alt="{{ $alt }}" style="
    max-width: 100%;
    height: auto;
    border: 1px solid var(--color-border);
    display: block;
    margin: 0 auto;
  ">
  {{ if $caption }}
  <figcaption style="
    margin-top: 0.75rem;
    font-family: var(--font-ui);
    font-size: 0.85rem;
    color: #666;
    font-style: italic;
  ">
    {{ $caption }}
  </figcaption>
  {{ end }}
</figure>
