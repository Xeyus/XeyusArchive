{{ define "main" }}
<article class="article-container" style="text-align: center; padding: 4rem 2rem;">
  <h1 style="font-size: 4rem; margin-bottom: 1rem;">404</h1>
  <p style="font-size: 1.5rem; margin-bottom: 2rem;">ARCHIVE ENTRY NOT FOUND</p>
  
  <p style="margin-bottom: 2rem;">
    The requested archive entry does not exist in the system database.
  </p>
  
  <a href="{{ .Site.BaseURL }}" style="
    display: inline-block;
    padding: 0.75rem 1.5rem;
    font-family: var(--font-ui);
    text-transform: uppercase;
    border: 1px solid var(--color-border);
    box-shadow: 
      2px 2px 0 rgba(0, 0, 0, 0.1),
      inset -1px -1px 0 rgba(0, 0, 0, 0.05),
      inset 1px 1px 0 rgba(255, 255, 255, 0.3);
  ">
    Return to Main Index
  </a>
</article>
{{ end }}
